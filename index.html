            currentState: "في حالة تطور ونمو وانتشار، ويُحافظ عليه بشكل جيد، مع جهود كبيرة من الجمعيات والمراكز.",
            safeguardingEfforts: "تأسيس الجمعية الليبية للخيل العربي، المركز الوطني للخيل العربي، الحصول على عضوية منظمة الواهو والايكاهو والافهار، استخراج السجل الليبي للخيل العربي، إنشاء مدارس تدريب على ركوب الخيل، تنظيم المسابقات والمهرجانات، خطط لدورات تدريبية للمدربين والفرسان الناشئين.",
            stakeholders: "الجمعية الليبية للخيل العربي (نوري فريوان)، إدارة سجل الأنساب (أحمد محمد هروس)، المركز الوطني للجواد العربي (د. صلاح الدين المشري، الدكتورة بشرى الطالب)، نادي جالو للفروسية (طارق المجبري).",
            references: "ابن الإجدابي، 'كفاية المتحفظ في اللغة'؛ عبد الحميد، محمد هـ. هارون (2018)؛ منى اهوين، 'الخيول في قورينائية'؛ محجوب، ع. (1978) فسيفساء فيلا رومانا دي سيلين؛ بالإضافة إلى العشرات من المراجع الأجنبية المذكورة في بطاقة الحصر."
        }
    };

    // متغيرات الحالة
    let currentDomain = "B";
    let currentView = "categories";
    const domainListEl = document.getElementById("domainList");
    const contentArea = document.getElementById("contentArea");

    // بناء الشريط الجانبي مع معالجة أخطاء الصور
    function buildSidebar() {
        const domains = [
            { code: "A", name: "التقاليد الشفهية (A)", icon: "fas fa-microphone-alt" },
            { code: "B", name: "فنون العروض (B)", icon: "fas fa-music" },
            { code: "C", name: "الممارسات والطقوس (C)", icon: "fas fa-hands-helping" },
            { code: "D", name: "المعارف والطبيعة (D)", icon: "fas fa-tree" },
            { code: "H", name: "الحرف التقليدية (H)", icon: "fas fa-hands" }
        ];
        domainListEl.innerHTML = "";
        domains.forEach(d => {
            const li = document.createElement("li");
            li.className = `domain-item ${currentDomain === d.code ? "active" : ""}`;
            const imgSrc = domainImages[d.code];
            const imgHtml = imgSrc ? `<img src="${imgSrc}" class="domain-img" alt="${d.code}" onerror="this.onerror=null; this.style.display='none'; this.nextElementSibling.style.display='inline-flex';">` : '';
            const iconHtml = `<i class="${d.icon}" style="${imgSrc ? 'display:none;' : 'display:inline-flex;'}"></i>`;
            li.innerHTML = `${imgHtml}${iconHtml}<span>${d.name}</span>`;
            li.addEventListener("click", () => {
                currentDomain = d.code;
                currentView = "categories";
                buildSidebar();
                renderCategories(currentDomain);
            });
            domainListEl.appendChild(li);
        });
    }

    // بناء شجرة التصنيفات ديناميكياً (مع الصور)
    function buildTreeHTML(node) {
        if (Array.isArray(node)) {
            return node.map(code => {
                const item = heritageData[code];
                const name = item ? item.name : code;
                const imgSrc = finalItemImages[code] || "";
                const imgHtml = imgSrc ? `<img src="${imgSrc}" class="final-img" alt="" onerror="this.style.display='none'">` : `<i class="fas fa-tag"></i>`;
                return `<div class="final-item" data-code="${code}">${imgHtml} ${name} (${code})</div>`;
            }).join('');
        } else if (typeof node === "object" && node !== null) {
            let html = "";
            for (let key in node) {
                const value = node[key];
                if (typeof value === "string") {
                    const code = key;
                    const item = heritageData[code];
                    const name = item ? item.name : value;
                    const imgSrc = finalItemImages[code] || "";
                    const imgHtml = imgSrc ? `<img src="${imgSrc}" class="final-img" alt="" onerror="this.style.display='none'">` : `<i class="fas fa-tag"></i>`;
                    html += `<div class="final-item" data-code="${code}">${imgHtml} ${name} (${code})</div>`;
                } else if (typeof value === "object") {
                    const displayName = value.name || key;
                    const imgSrc = categoryImages[key] || "";
                    const imgHtml = imgSrc ? `<img src="${imgSrc}" class="category-img" alt="" onerror="this.style.display='none'">` : `<i class="fas fa-folder category-img" style="font-size:1.8rem; color:#f5b041;"></i>`;
                    const childrenHtml = buildTreeHTML(value.children || value);
                    html += `
                        <div class="category-card">
                            <div class="category-header">
                                ${imgHtml}
                                <span class="category-title">📁 ${displayName} (${key})</span>
                                <i class="fas fa-chevron-down toggle-icon"></i>
                            </div>
                            <div class="subcategories">${childrenHtml}</div>
                        </div>
                    `;
                }
            }
            return html;
        }
        return "";
    }

    function renderCategories(domainCode) {
        const domain = categories[domainCode];
        if (!domain) { contentArea.innerHTML = `<div class="details-panel">لا توجد بيانات</div>`; return; }
        const treeHtml = buildTreeHTML(domain.children);
        contentArea.innerHTML = `<div class="details-panel"><h2><i class="fas fa-folder-open"></i> ${domain.name}</h2><div style="margin-top:20px;">${treeHtml}</div></div>`;
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll(".category-card .category-header").forEach(header => {
            header.removeEventListener("click", toggleHandler);
            header.addEventListener("click", toggleHandler);
        });
        document.querySelectorAll(".final-item").forEach(el => {
            el.removeEventListener("click", finalHandler);
            el.addEventListener("click", finalHandler);
        });
    }
    function toggleHandler(e) {
        e.stopPropagation();
        const parent = this.closest(".category-card");
        const sub = parent.querySelector(".subcategories");
        const icon = this.querySelector(".toggle-icon");
        if (sub) { sub.classList.toggle("show"); icon.classList.toggle("fa-chevron-up"); }
    }
    function finalHandler(e) {
        const code = this.getAttribute("data-code");
        if (code) showDetails(code);
    }

    // عرض التفاصيل مع دعم الأقسام الإضافية للجواد العربي
    function showDetails(code) {
        const data = heritageData[code];
        if (!data) {
            contentArea.innerHTML = `<div class="details-panel"><button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i> العودة</button><p>⚠️ لا توجد تفاصيل للرمز ${code}</p></div>`;
            document.getElementById("backBtn")?.addEventListener("click", () => { currentView = "categories"; renderCategories(currentDomain); });
            return;
        }
        let galleryHtml = "";
        if (data.images && data.images.length) {
            data.images.forEach(src => { galleryHtml += `<img src="${src}" alt="${data.name}">`; });
        } else { galleryHtml = "<p>لا توجد صور</p>"; }

        let extraSections = "";
        if (code === "B-2-3-1") {
            extraSections = `
                <div class="section-block"><div class="section-title"><i class="fas fa-tag"></i> أسماء أخرى</div><p>${data.otherNames}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-history"></i> التأصيل التاريخي والشواهد الأثرية</div><p><strong>التأصيل التاريخي:</strong> ${data.historicalRoots}</p><p><strong>الشواهد الأثرية:</strong> ${data.archaeologicalEvidences}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-feather-alt"></i> التراث العربي (ابن الإجدابي)</div><p>${data.arabicHeritage}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-tools"></i> العناصر المادية (الأدوات والأزياء)</div><p>${data.materialElements}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-magic"></i> العناصر غير المادية (التعابير - المعتقدات - الفنون)</div><p>${data.intangibleElements}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-calendar-alt"></i> السياق (الميز والعروض)</div><p>${data.contexts}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-users"></i> النقل والتوارث</div><p>${data.transmission}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-chart-line"></i> حالة العنصر وجهود الصون</div><p><strong>الحالة الحالية:</strong> ${data.currentState}<br><strong>جهود الصون:</strong> ${data.safeguardingEfforts}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-building"></i> المنظمات والأشخاص المعنيون</div><p>${data.stakeholders}</p></div>
                <div class="section-block"><div class="section-title"><i class="fas fa-book"></i> المراجع والمصادر</div><p>${data.references}</p></div>
            `;
        }
        const html = `
            <div class="details-panel">
                <button class="back-btn" id="backBtn"><i class="fas fa-arrow-right"></i> العودة إلى التصنيفات</button>
                <div class="heritage-title">${data.name}</div>
                <div class="code-badge"><i class="fas fa-tag"></i> ${code}</div>
                <div class="info-grid">
                    <div class="info-item"><strong>المنطقة/الانتشار</strong><br>${data.region}</div>
                    <div class="info-item"><strong>الحالة</strong><br><span style="background:#1e3a8a; color:white; padding:2px 12px; border-radius:20px;">${data.status}</span></div>
                    <div class="info-item"><strong>تاريخ التسجيل</strong><br>${data.date}</div>
                    <div class="info-item"><strong>المصدر</strong><br>${data.source}</div>
                </div>
                <div><strong>الوصف العام:</strong><p>${data.desc}</p></div>
                ${extraSections}
                <div style="margin-top:20px;"><strong>معرض الصور التوثيقية</strong><div class="gallery">${galleryHtml}</div></div>
            </div>
        `;
        contentArea.innerHTML = html;
        document.getElementById("backBtn")?.addEventListener("click", () => { currentView = "categories"; renderCategories(currentDomain); });
        currentView = "details";
    }

    // البحث في جميع العناصر
    function setupSearch() {
        const searchInput = document.getElementById("searchInput");
        searchInput.addEventListener("input", (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (term === "") { if (currentView === "categories") renderCategories(currentDomain); return; }
            const results = [];
            for (let [code, data] of Object.entries(heritageData)) {
                if (data.name.toLowerCase().includes(term) || code.toLowerCase().includes(term)) results.push({ code, name: data.name });
            }
            if (results.length === 0) { contentArea.innerHTML = `<div class="details-panel">🔍 لا توجد نتائج</div>`; return; }
            let resultsHtml = `<div class="details-panel"><h3>نتائج البحث عن: ${term}</h3><div style="display:flex; flex-wrap:wrap; gap:10px;">`;
            results.forEach(r => {
                const imgSrc = finalItemImages[r.code] || "";
                const imgHtml = imgSrc ? `<img src="${imgSrc}" class="final-img" alt="" onerror="this.style.display='none'">` : `<i class="fas fa-tag"></i>`;
                resultsHtml += `<div class="final-item" data-code="${r.code}">${imgHtml} ${r.name} (${r.code})</div>`;
            });
            resultsHtml += `</div><button class="back-btn" id="clearSearch">مسح البحث</button></div>`;
            contentArea.innerHTML = resultsHtml;
            document.querySelectorAll(".final-item").forEach(el => { el.addEventListener("click", () => showDetails(el.getAttribute("data-code"))); });
            document.getElementById("clearSearch")?.addEventListener("click", () => { searchInput.value = ""; renderCategories(currentDomain); currentView = "categories"; });
        });
    }

    // بدء التشغيل
    function init() { buildSidebar(); renderCategories("B"); setupSearch(); }
    init();
</script>
</body>
</html>
